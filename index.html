<!DOCTYPE html>
<html>
<head>
<title>AI Fertilizer Recommendation System</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(120deg,#4CAF50,#81C784);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:30px;
    border-radius:10px;
    width:400px;
    box-shadow:0px 0px 15px rgba(0,0,0,0.3);
}

h2{
    text-align:center;
    color:#2e7d32;
}

label{
    font-weight:bold;
}

input,select{
    width:100%;
    padding:8px;
    margin-top:5px;
    margin-bottom:15px;
    border-radius:5px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:10px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#2e7d32;
}

.result{
    text-align:center;
    font-size:18px;
    color:#d32f2f;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>🌱 AI Fertilizer Recommendation System</h2>

<form action="/predict" method="post">

<label>Temperature</label>
<input type="text" name="Temperature">

<label>Humidity</label>
<input type="text" name="Humidity">

<label>Moisture</label>
<input type="text" name="Moisture">

<label>Soil Type</label>
<select name="Soil">
<option value="0">Sandy</option>
<option value="1">Loamy</option>
<option value="2">Black</option>
<option value="3">Red</option>
<option value="4">Clayey</option>
</select>

<label>Crop Type</label>
<select name="Crop">
<option value="0">Maize</option>
<option value="1">Sugarcane</option>
<option value="2">Cotton</option>
<option value="3">Tobacco</option>
<option value="4">Paddy</option>
<option value="5">Wheat</option>
<option value="6">Rice</option>
</select>

<label>Nitrogen</label>
<input type="text" name="Nitrogen">

<label>Phosphorous</label>
<input type="text" name="Phosphorous">

<label>Potassium</label>
<input type="text" name="Potassium">

<button type="submit">Predict Fertilizer</button>

</form>

<div class="result">
{{ prediction_text }}
</div>

</div>

</body>
</html>
